<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Academic homepage of Zeyu Zhu, researcher in AI chip design, ML systems, heterogeneous computing, and model compression."
    />
    <title>Zeyu Zhu | Academic Homepage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="page">
      <aside class="profile" aria-label="Profile">
        <div id="portrait" class="portrait" aria-hidden="true"></div>
        <h1 id="profile-name"></h1>
        <p id="profile-name-cn" class="name-cn"></p>
        <p id="profile-title" class="profile-title"></p>
        <p id="profile-affiliation" class="profile-affiliation"></p>
        <p id="profile-location" class="profile-location"></p>

        <nav class="profile-links" id="profile-links" aria-label="External links"></nav>
      </aside>

      <main id="main" class="content">
        <nav class="top-nav" aria-label="Page sections">
          <a href="#about">About</a>
          <a href="#publications">Publications</a>
          <a href="#projects">Projects</a>
          <a href="#experience">Experience</a>
          <a href="#awards">Awards</a>
        </nav>

        <section id="about" class="section">
          <h2>About</h2>
          <p id="bio"></p>
          <div id="research-tags" class="tags" aria-label="Research interests"></div>
        </section>

        <section class="section compact-section" aria-label="Highlights">
          <h2>News</h2>
          <ul id="news-list" class="news-list"></ul>
        </section>

        <section id="publications" class="section">
          <div class="section-heading">
            <h2>Publications</h2>
            <p>Selected and recent papers from the CV.</p>
          </div>
          <ol id="publication-list" class="publication-list"></ol>
        </section>

        <section id="projects" class="section">
          <h2>Projects</h2>
          <div id="project-list" class="timeline"></div>
        </section>

        <section id="experience" class="section">
          <h2>Experience & Education</h2>
          <div class="two-column">
            <div>
              <h3>Experience</h3>
              <div id="experience-list" class="timeline"></div>
            </div>
            <div>
              <h3>Education</h3>
              <div id="education-list" class="timeline"></div>
            </div>
          </div>
        </section>

        <section id="skills" class="section">
          <h2>Skills</h2>
          <div id="skill-list" class="skill-grid"></div>
        </section>

        <section id="awards" class="section">
          <h2>Honors & Awards</h2>
          <ul id="award-list" class="award-list"></ul>
        </section>
      </main>
    </div>

    <script src="site-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
